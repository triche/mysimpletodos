<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Setup — {{ app_name }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', path='app.css') }}?v=2">
  </head>
  <body>
    <main class="auth-container">
      <div class="auth-card">
        <div class="auth-logo">
          <img src="{{ url_for('static', path='favicon.svg') }}" alt="" width="48" height="48">
        </div>
        <h1 class="auth-title">Welcome to {{ app_name }}</h1>
        <p class="auth-subtitle">Register a passkey to secure your tasks.</p>
        <button id="register-btn" class="auth-btn" type="button">
          <svg class="auth-btn-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a5 5 0 0 1 5 5v3H7V7a5 5 0 0 1 5-5z"/><rect x="3" y="10" width="18" height="12" rx="2"/><circle cx="12" cy="16" r="1"/></svg>
          Register Passkey
        </button>
        <p id="auth-status" class="auth-status"></p>
      </div>
    </main>
    <script src="{{ url_for('static', path='auth.js') }}"></script>
    <script>
      document.getElementById('register-btn').addEventListener('click', () => {
        startRegistration('/auth/setup/options', '/auth/setup/verify');
      });
    </script>
  </body>
</html>
