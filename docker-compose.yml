services:
  caddy:
    image: caddy:2
    container_name: mysimpletodos-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - todo-app

  todo-app:
    build:
      context: .
    image: mysimpletodos
    container_name: mysimpletodos-app
    restart: unless-stopped
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8080
      DATABASE_URL: sqlite:////data/todo.db
      TZ: America/Chicago
      # Generate a secret: python -c "import secrets; print(secrets.token_hex(32))"
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY:?Set AUTH_SECRET_KEY in .env or environment}
      WEBAUTHN_RP_ID: ${WEBAUTHN_RP_ID:-mysimpletodos.com}
      WEBAUTHN_ORIGIN: ${WEBAUTHN_ORIGIN:-https://mysimpletodos.com}
    expose:
      - "8080"
    volumes:
      - todo_app_data:/data

volumes:
  todo_app_data:
  caddy_data:
  caddy_config: